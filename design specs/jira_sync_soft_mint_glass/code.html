<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VoiceTicket - Jira Sync Complete</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#44e47e",
                        "background-light": "#f6f8f7",
                        "background-dark": "#112117",
                        "surface": "rgba(68, 228, 126, 0.05)",
                        "success": "#44e47e",
                        "muted": "#94a3b8"
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"],
                        "body": ["Spline Sans", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "sm": "6px",
                        "md": "12px",
                        "lg": "16px",
                        "xl": "24px",
                        "pill": "100px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #112117;
            color: #F1F5F9;
        }
        .glass {
            background: rgba(68, 228, 126, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(68, 228, 126, 0.15);
        }
        .mint-glow {
            box-shadow: 0 0 30px rgba(68, 228, 126, 0.2);
        }
        .button-glow {
            box-shadow: 0 0 20px rgba(68, 228, 126, 0.3);
        }
    </style>
</head>
<body class="font-body antialiased min-h-screen relative overflow-hidden flex items-center justify-center">
<!-- Decorative Background Elements -->
<div aria-hidden="true" class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Sync Complete Modal -->
<div class="relative z-20 w-full max-w-lg mx-4">
<div class="glass rounded-xl p-10 flex flex-col items-center text-center relative overflow-hidden">
<!-- Subtle internal gradient -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent pointer-events-none"></div>
<!-- Pulsing Success Icon -->
<div class="relative flex items-center justify-center w-24 h-24 mb-8">
<div class="absolute inset-0 bg-primary/10 rounded-full animate-pulse mint-glow border border-primary/20"></div>
<div class="relative w-16 h-16 bg-primary/20 border border-primary/40 rounded-full flex items-center justify-center">
<span aria-hidden="true" class="material-symbols-outlined text-primary text-4xl font-bold">check</span>
</div>
</div>
<!-- Header Content -->
<h1 class="font-display text-3xl font-bold text-slate-100 mb-3 tracking-tight">14 Tickets Synced</h1>
<p class="text-slate-400 text-[15px] mb-8 max-w-sm leading-relaxed">
            Your voice capture has been successfully parsed and pushed to Jira. The epic and all associated stories are now live.
        </p>
<!-- Generated Tags / Issue Keys -->
<div class="w-full bg-black/20 rounded-lg p-6 mb-8 border border-primary/10">
<div class="text-[11px] font-bold text-slate-500 mb-4 uppercase tracking-[0.2em] text-left opacity-70">Generated Issues</div>
<div class="flex flex-wrap gap-3 justify-center">
<a class="inline-flex items-center gap-1.5 px-3 py-1.5 glass hover:bg-primary/10 border border-primary/20 rounded-md transition-all group focus:outline-none focus:ring-2 focus:ring-primary/50" href="#">
<span class="material-symbols-outlined text-[16px] text-primary/80">bolt</span>
<span class="font-mono text-[13px] text-primary group-hover:text-primary transition-colors font-medium">AUTH-100</span>
</a>
<a class="inline-flex items-center gap-1.5 px-3 py-1.5 glass hover:bg-primary/10 border border-primary/20 rounded-md transition-all group focus:outline-none focus:ring-2 focus:ring-primary/50" href="#">
<span class="material-symbols-outlined text-[16px] text-primary/80">link</span>
<span class="font-mono text-[13px] text-primary group-hover:text-primary transition-colors font-medium">AUTH-101</span>
</a>
<a class="inline-flex items-center gap-1.5 px-3 py-1.5 glass hover:bg-primary/10 border border-primary/20 rounded-md transition-all group focus:outline-none focus:ring-2 focus:ring-primary/50" href="#">
<span class="material-symbols-outlined text-[16px] text-primary/80">link</span>
<span class="font-mono text-[13px] text-primary group-hover:text-primary transition-colors font-medium">AUTH-102</span>
</a>
<a class="inline-flex items-center gap-1.5 px-3 py-1.5 glass hover:bg-primary/10 border border-primary/20 rounded-md transition-all group focus:outline-none focus:ring-2 focus:ring-primary/50" href="#">
<span class="material-symbols-outlined text-[16px] text-primary/80">task</span>
<span class="font-mono text-[13px] text-primary group-hover:text-primary transition-colors font-medium">AUTH-103</span>
</a>
<a class="inline-flex items-center gap-1.5 px-3 py-1.5 glass hover:bg-primary/10 border border-primary/20 rounded-md transition-all group focus:outline-none focus:ring-2 focus:ring-primary/50" href="#">
<span class="material-symbols-outlined text-[16px] text-primary/80">task</span>
<span class="font-mono text-[13px] text-primary group-hover:text-primary transition-colors font-medium">AUTH-104</span>
</a>
<div class="inline-flex items-center px-3 py-1.5 text-slate-500 font-mono text-[13px] italic">
                    + 9 more
                </div>
</div>
</div>
<!-- Call to Action -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-background-dark font-display font-bold text-base rounded-xl transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background-dark flex items-center justify-center gap-2 button-glow">
<span>Return to Dashboard</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</body></html>
